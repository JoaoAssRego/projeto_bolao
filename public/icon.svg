<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0e1f14"></stop>
      <stop offset="100%" stop-color="#03080a"></stop>
    </radialGradient>
    <radialGradient id="ball" cx="32%" cy="26%" r="74%">
      <stop offset="0%" stop-color="#fff176"></stop>
      <stop offset="40%" stop-color="#ffe000"></stop>
      <stop offset="80%" stop-color="#f5a800"></stop>
      <stop offset="100%" stop-color="#d07800"></stop>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="40%" stop-color="transparent"></stop>
      <stop offset="100%" stop-color="#ffe000" stop-opacity="0.55"></stop>
    </radialGradient>
    <radialGradient id="glassHi" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.65"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
    </radialGradient>
    <clipPath id="bc"><circle cx="256" cy="252" r="148"></circle></clipPath>
    <filter id="seamGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5.5"></feGaussianBlur>
    </filter>
    <filter id="bigBloom" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="30"></feGaussianBlur>
    </filter>
    <filter id="rimGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"></feGaussianBlur>
    </filter>
  </defs>

  
  <rect width="512" height="512" rx="100" fill="url(#bg)"></rect>

  
  <circle cx="256" cy="252" r="200" fill="#ffe000" opacity="0.12" filter="url(#bigBloom)"></circle>
  
  <circle cx="256" cy="252" r="180" fill="#00ff70" opacity="0.055" filter="url(#bigBloom)"></circle>

  
  <ellipse cx="256" cy="492" rx="248" ry="82" fill="none" stroke="#00e864" stroke-width="1.2" opacity="0.10"></ellipse>
  <ellipse cx="256" cy="492" rx="192" ry="63" fill="none" stroke="#00e864" stroke-width="0.8" opacity="0.07"></ellipse>
  <ellipse cx="256" cy="492" rx="138" ry="46" fill="none" stroke="#00e864" stroke-width="0.6" opacity="0.05"></ellipse>

  
  <circle cx="256" cy="252" r="158" fill="none" stroke="#ffe000" stroke-width="28" opacity="0.14" filter="url(#bigBloom)"></circle>
  <circle cx="256" cy="252" r="158" fill="none" stroke="#00ff70" stroke-width="18" opacity="0.12" filter="url(#rimGlow)"></circle>

  
  <circle cx="256" cy="252" r="148" fill="url(#ball)"></circle>

  
  <g clip-path="url(#bc)" fill="none" stroke="#00e864" stroke-width="14" stroke-linecap="round" opacity="0.35" filter="url(#seamGlow)">
    <path d="M 108,252 C 168,130 344,374 404,252"></path>
    <path d="M 328,119 C 352,247 160,257 184,385"></path>
    <path d="M 184,119 C 160,247 352,257 328,385"></path>
  </g>
  
  <g clip-path="url(#bc)" fill="none" stroke="#005a20" stroke-width="4.2" stroke-linecap="round">
    <path d="M 108,252 C 168,130 344,374 404,252"></path>
    <path d="M 328,119 C 352,247 160,257 184,385"></path>
    <path d="M 184,119 C 160,247 352,257 328,385"></path>
  </g>
  
  <g clip-path="url(#bc)" fill="none" stroke="#00d060" stroke-width="1.3" stroke-linecap="round" opacity="0.5">
    <path d="M 108,252 C 168,130 344,374 404,252"></path>
    <path d="M 328,119 C 352,247 160,257 184,385"></path>
    <path d="M 184,119 C 160,247 352,257 328,385"></path>
  </g>

  
  <ellipse cx="205" cy="178" rx="66" ry="36" fill="url(#glassHi)" transform="rotate(-22 205 178)"></ellipse>

  
  <circle cx="256" cy="252" r="148" fill="url(#outerGlow)"></circle>

  
  <circle cx="256" cy="252" r="148" fill="none" stroke="#00ff6a" stroke-width="3.2" opacity="0.9"></circle>

  
  <circle cx="256" cy="252" r="153" fill="none" stroke="#ffe000" stroke-width="2" opacity="0.55"></circle>

  
  <circle cx="256" cy="68" r="4.5" fill="#ffe000" opacity="0.90"></circle>
  <circle cx="236" cy="74" r="2.8" fill="#00e864" opacity="0.70"></circle>
  <circle cx="276" cy="74" r="2.8" fill="#00e864" opacity="0.70"></circle>
  <circle cx="218" cy="87" r="2" fill="#ffe000" opacity="0.45"></circle>
  <circle cx="294" cy="87" r="2" fill="#ffe000" opacity="0.45"></circle>
</svg>